# Robustness TEST-07a — Multiplier-floor-16 companion runs.
#
# Like-for-like re-runs of the two phase-2 suites that pin multiplier_floor = 4
# (phase-2-rb-scarcity and phase-2-urgency-inversion) at multiplier_floor = 16
# instead. Everything else holds: same demand profile (paper_like_congested
# for rb-scarcity, paper_like_congested + paper_like_mispriced for urgency-
# inversion), same topology, same slot count, same protocol overlays.
#
# Verdict (per CONTEXT.md Claude's Discretion §"Multiplier-floor-16 companion
# run details (TEST-07a)" + Phase 1 SUMMARY):
#   MITIGATED       iff the qualitative finding replicates at floor 16 (or is
#                   reframed as "observable only when floor is low enough to
#                   admit medium-urgency components to priority").
#   LIVE → DISCLOSED if the finding inverts at floor 16.
#
# Comparison is qualitative — no paired BCa CI gate. N = 5 seeds suffices to
# establish sign-coherence on the welfare delta.
#
# N = 5 seeds. NOT goldens-pinned.

suite-name: robustness-multiplier-floor-16-companion
output-dir: output/robustness/multiplier-floor-16-companion
seeds: [1, 2, 3, 4, 5]
default-slots: 2000
default-topology: parameters/phase-2-sweep/topology-realistic-100.yaml
default-protocol: parameters/phase-2-sweep/protocol-base.yaml
default-demand: parameters/phase-2-sweep/demand/paper_like_congested.yaml

jobs:
  # --- RB-scarcity companion at multiplier_floor = 16 (vs floor = 4 in phase-2-rb-scarcity.yaml) ---
  - name: rb_scarcity_x16_baseline
    pricing: parameters/phase-2-sweep/pricing/two_lane_priority_only_static_x16.yaml
  - name: rb_scarcity_x16_rb_half
    pricing: parameters/phase-2-sweep/pricing/two_lane_priority_only_static_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-half.yaml
  - name: rb_scarcity_x16_rb_third
    pricing: parameters/phase-2-sweep/pricing/two_lane_priority_only_static_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-third.yaml
  - name: rb_scarcity_x16_rb_quarter
    pricing: parameters/phase-2-sweep/pricing/two_lane_priority_only_static_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-quarter.yaml

  # --- Urgency-inversion companion at multiplier_floor = 16 (vs floor = 4 in phase-2-urgency-inversion.yaml) ---
  - name: urgency_inversion_x16_correctly_priced
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml
  - name: urgency_inversion_x16_mispriced_high_urgency
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml
    overrides:
      demand: parameters/phase-2-sweep/demand/paper_like_mispriced.yaml
