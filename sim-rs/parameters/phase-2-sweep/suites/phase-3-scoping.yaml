# Phase-3 scoping suite (TEST-02 — wall-clock measurement for N selection).
#
# Purpose: measure per-(job, seed) wall-clock at the canonical Phase-3
# configuration (topology-realistic-100, protocol-base, paper_like_congested)
# so Wave 2 can pick N from {10, 15, 18, 20} subject to a ~30 min × parallelism
# total-compute budget per cell.
#
# Canonical job choice: `multiplier_x4` from phase-2-priority-only-unreserved
# (pricing: two_lane_priority_only_unreserved_x4). Rationale:
#   - Un-reserved priority-only is one of the four menu mechanisms; it's a
#     "live signal" suite (priority demand drifts the controller).
#   - Multiplier-floor = 4 produces meaningful priority traffic per CLAUDE.md
#     §"Calibration choices" (at floor=16, urgency<5 components don't pick
#     priority and the controller stays static, biasing wall-clock low).
#   - NOT a sign-flip cell — sign-flip cells (d4_t50_w32, d8_t25_w32,
#     x4_rb_quarter) are the targets of TEST-03, not TEST-02; running them
#     here would bias the scoping measurement toward the very variance
#     TEST-03 needs to characterise.
#
# Per CONTEXT.md D-25: Phase-3 suites are NOT goldens-pinned (no entry in
# parameters/phase-2-sweep/suites/.goldens/, no row in sim-cli/tests/determinism.rs).
#
# Per CONTEXT.md D-26: seeds are sequential [1, 2, 3, 4, 5]. Wave 2's
# chosen N is recorded in .planning/realism-tests/multi-seed-variance/scoping-results.md
# as a bolded "**Chosen N for Wave 2: N = <N>**" line.
#
# Run from sim-rs/:
#   cargo run --release --bin experiment-suite -- run \
#       parameters/phase-2-sweep/suites/phase-3-scoping.yaml -P 8
#
suite-name: phase-3-scoping
output-dir: output/phase-3/scoping
seeds: [1, 2, 3, 4, 5]
default-slots: 2000
default-topology: parameters/phase-2-sweep/topology-realistic-100.yaml
default-protocol: parameters/phase-2-sweep/protocol-base.yaml
default-demand: parameters/phase-2-sweep/demand/paper_like_congested.yaml
jobs:
  - name: multiplier_x4
    pricing: parameters/phase-2-sweep/pricing/two_lane_priority_only_unreserved_x4.yaml
