# yaml-language-server: $schema=../../suites/suite.schema.json

defaults:
  topology: parameters/topology.default.yaml
  parameters:
    - parameters/linear.yaml
    - parameters/phase-2-sweep/protocol-base.yaml
  slots: 2000
  trace: false

jobs:
  - id: combined-winner-delay0-paper-like
    label: Stage C Combined Winner Delay0 (paper-like)
    parameters:
      - parameters/phase-2-sweep/experiments/paper-like-baseline.yaml
    compare-parameters:
      - parameters/phase-2-sweep/experiments/paper-like-eip1559.yaml
      - parameters/phase-2-sweep/experiments/paper-like-continuous-pivot.yaml
      - parameters/phase-2-sweep/experiments/paper-like-combined-winner.yaml
      - parameters/phase-2-sweep/experiments/paper-like-combined-winner-delay0.yaml
      - parameters/phase-2-sweep/experiments/paper-like-continuous-rb-eb-fallback.yaml
    seeds: [42, 43, 44, 45, 46]

  - id: combined-winner-delay0-sundaeswap
    label: Stage C Combined Winner Delay0 (sundaeswap)
    parameters:
      - parameters/phase-2-sweep/experiments/sundaeswap-baseline.yaml
    compare-parameters:
      - parameters/phase-2-sweep/experiments/sundaeswap-eip1559.yaml
      - parameters/phase-2-sweep/experiments/sundaeswap-continuous-pivot.yaml
      - parameters/phase-2-sweep/experiments/sundaeswap-combined-winner.yaml
      - parameters/phase-2-sweep/experiments/sundaeswap-combined-winner-delay0.yaml
    seeds: [42, 43, 44, 45, 46]
