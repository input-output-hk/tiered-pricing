# Low-value-skewed variant of paper_like_quick.toml.
# The mix shifts much more demand into cheaper, less urgent transactions so EB
# tiers should see more natural uptake without changing arrival rates or sizes.

[[actors]]
name = "correlated_first_half"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [{ start_slot = 0, end_slot = 500, rate = 16.0 }, { start_slot = 500, end_slot = 1000, rate = 34.0 }] }
tx_size = { kind = "normal", params = [400, 100] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "high_val_high_urg"
weight = 0.02
value_distribution = { kind = "normal", params = [4000000.0, 1500000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.03, 1.06] }

