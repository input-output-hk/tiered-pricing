# Robustness TEST-05 — Pool-number sensitivity (150 vs existing 100 pools).
#
# Scope cut from the over-scoped original (330 cells × 5 seeds = 1650 runs).
# The plan's literal text is: "topology-realistic-150.yaml rerun of (33-job
# smoke × 5 demand profiles) at 150 pools **vs the existing 100-pool runs**".
# In tree we have 3-seed 100-pool sundaeswap_moderate coverage (from the
# three existing phase-2-sundaeswap-* suites at seeds [1, 2, 3]); we do
# NOT have the 4 paper_like_* 100-pool variants at multi-seed. Running
# the 100-pool side fresh for paper_like_* would re-blow the suite up.
#
# Decision: this suite covers ONLY (sundaeswap_moderate × 150-pool) at
# N=5 seeds. That's 33 jobs × 5 seeds = 165 fresh runs. The 100-pool
# baseline uses existing in-tree 3-seed data. The 4 paper_like_* profiles
# are deferred as a Phase 4 disclosure gap rather than measured here —
# the analysis writes that up in
# `.planning/realism-tests/pool-number-sensitivity/results.md`.
#
# Verdict (per CONTEXT.md Claude's Discretion §"Verdict on TEST-05"):
#   MITIGATED       iff for every job, the 150-pool seed-median Δ% on
#                   welfare metrics (retained_value, net_utility,
#                   retained_value_ratio) is within the 100-pool seed-Inter-
#                   Quartile-Range (IQR) (from existing 3-seed data).
#   LIVE→DISCLOSED  if any job shows Δ% outside the 100-pool seed-IQR.
#
# N = 5 seeds per cell. NOT goldens-pinned.


suite-name: robustness-pool-number-sensitivity
output-dir: output/robustness/pool-number-sensitivity
seeds:
- 1
- 2
- 3
- 4
- 5
default-slots: 2000
default-topology: parameters/phase-2-sweep/topology-realistic-150.yaml
default-protocol: parameters/phase-2-sweep/protocol-base.yaml
default-demand: parameters/phase-2-sweep/demand/sundaeswap_moderate.yaml
