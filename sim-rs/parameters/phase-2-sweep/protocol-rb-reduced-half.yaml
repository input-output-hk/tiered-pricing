# RB-scarcity protocol overlay: half-capacity RB.
#
# This file is a *full replacement* for `protocol-base.yaml`, not a
# stacked overlay — the suite runner picks either `default-protocol`
# OR `overrides.protocol`, never both. Mirror everything from
# `protocol-base.yaml` and override `rb-body-max-size-bytes`.
#
# Per spec, `priority_reservation_bytes = max_block_size =
# rb_body_max_size_bytes` (mechanism-design.md line 160), so the EB
# priority partition halves in lockstep.
#
# Total per-slot priority capacity: 2 × 45056 = 90 KB (vs baseline 180 KB).

leios-variant: linear-with-tx-references
timestamp-resolution-ms: 0.05

min-fee-a: 44
min-fee-b: 155381

mempool-max-total-size-bytes: null

simulate-transactions: true
rb-generation-probability: 0.05

# CIP-0164 Table 7 calibrated multi-node voting (M6). See
# protocol-base.yaml for the rationale.
vote-generation-probability: 600.0
vote-threshold: 450

# CIP-0164 Table 7 calibration (matches protocol-base.yaml).
linear-vote-stage-length-slots: 4
linear-diffuse-stage-length-slots: 7
eb-referenced-txs-max-size-bytes: 12000000
eb-max-size-bytes: 512000
eb-body-validation-cpu-time-ms-per-byte: 2.15e-5

# RB-scarcity knob.
rb-body-max-size-bytes: 45056
