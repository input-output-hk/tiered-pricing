# yaml-language-server: $schema=../../suites/suite.schema.json

defaults:
  topology: parameters/topology.default.yaml
  parameters:
    - parameters/linear.yaml
    - parameters/phase-2-sweep/protocol-base.yaml
  slots: 2000
  trace: false

jobs:
  - id: delay0-denom-sweep
    label: Delay0 Denominator Sweep (paper-like)
    parameters:
      - parameters/phase-2-sweep/experiments/paper-like-baseline.yaml
    compare-parameters:
      - parameters/phase-2-sweep/experiments/paper-like-eip1559.yaml
      - parameters/phase-2-sweep/experiments/paper-like-delay0-denom1.yaml
      - parameters/phase-2-sweep/experiments/paper-like-delay0-denom2.yaml
      - parameters/phase-2-sweep/experiments/paper-like-delay0-denom4.yaml
      - parameters/phase-2-sweep/experiments/paper-like-delay0-denom8.yaml
      - parameters/phase-2-sweep/experiments/paper-like-delay0-denom16.yaml
    seeds: [42, 43, 44, 45, 46]
