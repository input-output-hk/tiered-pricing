# Giorgos-design-only FIFO smoke under sundaeswap_overcapacity.
#
# One seed, one job. Use this for a quick standalone check of Giorgos'
# RB-reserved both-dynamic design where EB inclusions pay standard
# price while priority-posted EB bytes still feed the priority
# controller.

suite-name: robustness-giorgos-design-smoke-sundaeswap-overcapacity
output-dir: output/robustness/giorgos-design-smoke-sundaeswap-overcapacity
seeds: [1]
default-slots: 2000
default-topology: parameters/phase-2-sweep/topology-realistic-100.yaml
default-protocol: parameters/phase-2-sweep/protocol-base.yaml
default-demand: parameters/phase-2-sweep/demand/sundaeswap_overcapacity.yaml

jobs:
  - name: giorgos_design_rb_reserved_both_dynamic_eb_standard_fifo_x4
    pricing: parameters/phase-2-sweep/pricing/two_lane_giorgos_rb_reserved_both_dynamic_eb_standard_x4_fifo.yaml
