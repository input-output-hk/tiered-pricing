# paper_like_congested × all both-dynamic variants.
# Includes RB-cap sweep for the partitioned (RB-reserved) sub-family.
# Un-reserved variants don't pin to RB body, so they only run at default
# protocol.

suite-name: phase-2-congested-both-dynamic
output-dir: output/phase-2/congested-both-dynamic
seeds: [1, 2, 3]
default-slots: 2000
default-topology: parameters/topology.default.yaml
default-protocol: parameters/phase-2-sweep/protocol-base.yaml
default-demand: parameters/phase-2-sweep/demand/paper_like_congested.yaml

jobs:
  - name: partitioned_x4
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x4.yaml
  - name: partitioned_x16
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml

  - name: unreserved_x4
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_unreserved_x4.yaml
  - name: unreserved_x16
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_unreserved_x16.yaml

  - name: partitioned_x4_rb_half
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x4.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-half.yaml
  - name: partitioned_x4_rb_third
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x4.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-third.yaml
  - name: partitioned_x4_rb_quarter
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x4.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-quarter.yaml

  - name: partitioned_x16_rb_half
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-half.yaml
  - name: partitioned_x16_rb_third
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-third.yaml
  - name: partitioned_x16_rb_quarter
    pricing: parameters/phase-2-sweep/pricing/two_lane_both_dynamic_partitioned_x16.yaml
    overrides:
      protocol: parameters/phase-2-sweep/protocol-rb-reduced-quarter.yaml
