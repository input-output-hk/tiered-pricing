<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>phase-2 sim viz</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <header>
    <h1><a href="#/">phase-2 sim viz</a></h1>
    <p class="muted">
      Local-first developer Single-Page Application (SPA) for browsing
      phase-2 simulator output under <code>sim-rs/output/</code>.
    </p>
  </header>
  <main>
    <div id="app"></div>
  </main>
  <!--
    Observable Plot 0.6.17 UMD externalizes D3 — its UMD entry reads
    `globalThis.d3`, so D3 7.9.0 must be loaded FIRST or every method
    that delegates to D3 (Plot.ruleY, Plot.timeSecond, scale ticks,
    etc.) fails with TypeError. Both are vendored locally per D-19;
    no CDN request fires at page load.
  -->
  <script src="static/d3.min.js"></script>
  <script src="static/plot.min.js"></script>
  <script type="module" src="static/main.js"></script>
</body>
</html>
