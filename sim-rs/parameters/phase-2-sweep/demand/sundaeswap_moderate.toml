# SundaeSwap-style DEX launch congestion, calibrated to effective Leios throughput.
#
# Effective throughput is constrained by EB propagation (~15-30KB/slot observed),
# not raw EB capacity (16MB). This profile targets that practical regime.
#
# Phase structure:
#   Slots 0-400:    Normal mixed traffic (~12 tx/slot, ~40% of effective capacity)
#   Slots 400-800:  DEX launch spike (~50 tx/slot, ~160% of effective capacity)
#   Slots 800-1200: Cooldown (~30 tx/slot, ~100% of effective capacity)
#   Slots 1200-2000: Recovery (~15 tx/slot, ~50% of effective capacity)
#
# Tx sizes: post-Vasil Cardano (350-1200 bytes depending on type).
# Values: economic surplus calibrated above Cardano min fee.
# Sources: SundaeSwap Jan 2022 launch data (CoinTelegraph, CoinDesk).

# ============================================================================
# Background simple transfers (always-on, patient)
# ============================================================================
[[actors]]
name = "background_transfers"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [
    { start_slot = 0, end_slot = 2000, rate = 6.0 },
] }
tx_size = { kind = "normal", params = [350, 80] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "simple_transfer"
weight = 0.60
value_distribution = { kind = "normal", params = [1000000.0, 400000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.001, 1.005] }

[[actors.value_urgency_components]]
name = "staking_governance"
weight = 0.25
value_distribution = { kind = "normal", params = [600000.0, 250000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.0005, 1.002] }

[[actors.value_urgency_components]]
name = "moderate_transfer"
weight = 0.15
value_distribution = { kind = "normal", params = [3000000.0, 1500000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.003, 1.01] }

