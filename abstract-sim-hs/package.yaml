name:                abstract-sim-hs
version:             0.1.0.0
github:              "githubuser/abstract-sim-hs"
license:             BSD-3-Clause
author:              "Author name here"
maintainer:          "example@example.com"
copyright:           "2026 Author name here"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/abstract-sim-hs#readme>

dependencies:
- base >= 4.7 && < 5
- containers
- mtl
- random

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

default-extensions:
# --- Syntax / quality-of-life ---
- BlockArguments
- LambdaCase
- MultiWayIf
- TupleSections
- ViewPatterns
- ImportQualifiedPost
- NumericUnderscores
- OverloadedStrings
- OverloadedRecordDot
- RecordWildCards
- NamedFieldPuns
- DuplicateRecordFields
- InstanceSigs
- BangPatterns
# --- Deriving ---
- DerivingStrategies
- DerivingVia
- GeneralizedNewtypeDeriving
- StandaloneDeriving
- DeriveGeneric
- DeriveFunctor
- DeriveFoldable
- DeriveTraversable
- DeriveAnyClass
# --- Type-system features ---
- GADTs
- TypeFamilies
- DataKinds
- PolyKinds
- KindSignatures
- StandaloneKindSignatures
- RankNTypes
- ScopedTypeVariables
- TypeApplications
- TypeOperators
- FlexibleContexts
- FlexibleInstances
- MultiParamTypeClasses
- FunctionalDependencies
- ConstraintKinds
- ExistentialQuantification
- QuantifiedConstraints
- UndecidableInstances

library:
  source-dirs: src

executables:
  abstract-sim-hs-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - abstract-sim-hs

tests:
  abstract-sim-hs-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - abstract-sim-hs
