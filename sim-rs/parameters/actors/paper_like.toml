# Optional per-actor overflow retry policy override:
# Add this block under a specific [[actors]] entry to replace the global
# tiered_config.overflow_retry_policy for that actor only.
#
# [actors.overflow_retry_policy_override]
# enabled = true
# source = "local_actor_submissions"
# curve_metric = "retained_value_ratio"
# backoff_mode = "exponential"
# max_delay_slots = 64
#
# [[actors.overflow_retry_policy_override.bands]]
# min_retained_ratio = 0.0
# max_retained_ratio = 0.4
# max_attempts = 0
# base_delay_slots = 0
#
# [[actors.overflow_retry_policy_override.bands]]
# min_retained_ratio = 0.4
# max_retained_ratio = 0.8
# max_attempts = 2
# base_delay_slots = 2
#
# [[actors.overflow_retry_policy_override.bands]]
# min_retained_ratio = 0.8
# max_retained_ratio = 1.0
# max_attempts = 6
# base_delay_slots = 2

[[actors]]
name = "retail_transfers"
arrival_rate = 80.0
tx_size = { kind = "normal", params = [400, 100] }
value_distribution = { kind = "uniform", params = [100000, 500000] }
