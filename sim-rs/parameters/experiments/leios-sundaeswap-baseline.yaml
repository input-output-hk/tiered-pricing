# Baseline: plain linear-Leios with fixed fees, no tiered pricing.
# SundaeSwap-style congestion event -- demand spikes to 4x capacity.
# This is the "what would have happened without the mechanism" control.
leios-variant: linear
tx-generator: actors
enforce-tier-delay: false
seed: 42
rb-inline-txs-with-endorsement-enabled: true
leios-header-diffusion-time-ms: 2000.0
linear-vote-stage-length-slots: 3
linear-diffuse-stage-length-slots: 4
vote-threshold: 180
eb-referenced-txs-max-size-bytes: 16384000
pricing:
  config-path: "parameters/pricing/baseline_quick.toml"
actors:
  config-path: "parameters/actors/sundaeswap_congestion.toml"
