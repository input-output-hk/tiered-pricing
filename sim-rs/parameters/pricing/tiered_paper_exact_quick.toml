# Exact reproduction of the pricing parameters from Kiayias et al. (2304.06014), Section 7.
#
# Paper specifies:
#   - B = 120 txs per block, 4 tiers, each a quarter of the block
#   - Delay update every 25 blocks (= 500 slots at 0.05 RB probability)
#   - Tier size update every 100 blocks (= 2000 slots)
#   - Delay decrease probability 0.25
#   - Add tier when lowest price >= 2
#   - Remove tier when lowest price < 1

[pricing_mechanism]
kind = "tiered_pricing"

[pricing_mechanism.tiered_config]
assignment_semantics = "legacy_revalidate_current_tier"
reject_on_pending_tier_overflow = true
total_capacity = 90112
separate_eb_pool = true
max_tiers = 4
tier_size_fractions = [0.0, 0.25, 0.25, 0.25]
base_fee_change_denominator = 8
target_utilisation = 0.5
delay_update_period_slots = 80
delay_increase_threshold = 0.9
delay_increase_thresholds = [0.9, 0.9, 0.9]
delay_decrease_prob = 0.25
min_delay_ratio = 2.0
min_delay_ratios = [2.0, 2.0, 2.0]
tier_update_period_slots = 160
add_tier_threshold = 100
remove_tier_threshold = 70
new_tier_price = 90
new_tier_delay_ratio = 2.0

[pricing_mechanism.tiered_config.overflow_retry_policy]
enabled = true
source = "local_actor_submissions"
curve_metric = "retained_value_ratio"
backoff_mode = "exponential"
max_delay_slots = 64

[[pricing_mechanism.tiered_config.overflow_retry_policy.bands]]
min_retained_ratio = 0.0
max_retained_ratio = 0.4
max_attempts = 0
base_delay_slots = 0

[[pricing_mechanism.tiered_config.overflow_retry_policy.bands]]
min_retained_ratio = 0.4
max_retained_ratio = 0.8
max_attempts = 2
base_delay_slots = 2

[[pricing_mechanism.tiered_config.overflow_retry_policy.bands]]
min_retained_ratio = 0.8
max_retained_ratio = 1.0
max_attempts = 6
base_delay_slots = 2
