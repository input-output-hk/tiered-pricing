# SundaeSwap-style congestion event actor profile
#
# Models a DEX launch causing a sudden demand spike with heterogeneous urgency.
# Calibrated against the Jan 2022 SundaeSwap launch on Cardano (92.8% block
# utilization, 11K order backlog, 4-9hr wait times for retail).
#
# Phase structure (~2000 slots = ~100 blocks):
#   Slots   0-400:  Normal mixed traffic, demand ~ capacity (~9 tx/slot)
#   Slots 400-800:  Spike -- DEX launch, ~4x capacity (~37 tx/slot)
#   Slots 800-1200: Cooldown, ~2x capacity (~20 tx/slot)
#   Slots 1200-2000: Recovery back to normal (~11 tx/slot)
#
# With rb-body-max-size-bytes=90112 and avg tx ~420 bytes:
#   Block capacity ~ 200 txs/block = 10 txs/slot

# ============================================================================
# Actor 1: Background simple transfers (always-on, patient)
# ============================================================================
# Represents: simple ADA transfers, stake delegations, governance votes.
# ~49% of normal Cardano traffic. Very low urgency -- minutes/hours don't matter.

[[actors]]
name = "background_transfers"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [
    { start_slot = 0, end_slot = 2000, rate = 6.0 },
] }
tx_size = { kind = "normal", params = [350, 80] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "simple_transfer"
weight = 0.60
value_distribution = { kind = "normal", params = [200000.0, 100000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.001, 1.005] }

[[actors.value_urgency_components]]
name = "staking_governance"
weight = 0.25
value_distribution = { kind = "normal", params = [100000.0, 60000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.0005, 1.002] }

[[actors.value_urgency_components]]
name = "moderate_transfer"
weight = 0.15
value_distribution = { kind = "normal", params = [600000.0, 300000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.003, 1.01] }

# ============================================================================
# Actor 2: Background DeFi (always-on, moderate urgency)
# ============================================================================
# Represents: regular DEX swaps, lending protocol interactions, yield farming.
# ~31% of normal Cardano traffic. Moderate urgency -- slippage concerns.

[[actors]]
name = "background_defi"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [
    { start_slot = 0, end_slot = 2000, rate = 3.0 },
] }
tx_size = { kind = "normal", params = [500, 120] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "routine_swap"
weight = 0.50
value_distribution = { kind = "normal", params = [600000.0, 300000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.01, 1.03] }

[[actors.value_urgency_components]]
name = "larger_defi_op"
weight = 0.30
value_distribution = { kind = "normal", params = [1500000.0, 600000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.015, 1.04] }

[[actors.value_urgency_components]]
name = "small_yield_farm"
weight = 0.20
value_distribution = { kind = "normal", params = [300000.0, 150000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.005, 1.015] }

# ============================================================================
# Actor 3: DEX launch retail users (spike traffic)
# ============================================================================
# Represents: the flood of users trying the new DEX during launch.
# During SundaeSwap, 11K orders hit on-chain in the first hours, with only
# ~1600 within slippage tolerance. Mix of eager early adopters and casual
# users who heard about the launch.

[[actors]]
name = "dex_launch_retail"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [
    { start_slot = 0, end_slot = 400, rate = 0.0 },
    { start_slot = 400, end_slot = 800, rate = 25.0 },
    { start_slot = 800, end_slot = 1200, rate = 10.0 },
    { start_slot = 1200, end_slot = 2000, rate = 2.0 },
] }
tx_size = { kind = "normal", params = [500, 100] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "casual_swapper"
weight = 0.40
value_distribution = { kind = "normal", params = [200000.0, 100000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.005, 1.02] }

[[actors.value_urgency_components]]
name = "eager_early_adopter"
weight = 0.35
value_distribution = { kind = "normal", params = [500000.0, 200000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.02, 1.06] }

[[actors.value_urgency_components]]
name = "fomo_buyer"
weight = 0.25
value_distribution = { kind = "normal", params = [150000.0, 80000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.01, 1.04] }

# ============================================================================
# Actor 4: Arbitrage / MEV bots (spike traffic, very high urgency)
# ============================================================================
# Represents: bots exploiting price discrepancies across DEXs during launch.
# During SundaeSwap, whales were able to swap while retail suffered. These
# bots have very high urgency (price moves in seconds) and high value per tx.
# Small % of traffic but economically dominant.

[[actors]]
name = "arbitrage_bots"
arrival_rate = 0.0
arrival_pattern = { kind = "phased", phases = [
    { start_slot = 0, end_slot = 400, rate = 0.0 },
    { start_slot = 400, end_slot = 800, rate = 3.0 },
    { start_slot = 800, end_slot = 1200, rate = 1.0 },
    { start_slot = 1200, end_slot = 2000, rate = 0.0 },
] }
tx_size = { kind = "normal", params = [350, 60] }
value_distribution = { kind = "constant", params = [0] }
urgency = { kind = "indifferent" }

[[actors.value_urgency_components]]
name = "dex_arb"
weight = 0.70
value_distribution = { kind = "normal", params = [5000000.0, 2000000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.3, 2.0] }

[[actors.value_urgency_components]]
name = "whale_swap"
weight = 0.30
value_distribution = { kind = "normal", params = [10000000.0, 4000000.0] }
urgency_u_distribution = { kind = "uniform", params = [1.15, 1.5] }
