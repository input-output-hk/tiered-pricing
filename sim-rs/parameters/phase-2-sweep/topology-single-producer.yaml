# Single-producer topology for phase-2 suites.
#
# One node that both (a) has stake (so it wins the RB lottery) and
# (b) carries `tx-generation-weight: 1` (so it runs the actor model
# at slot ticks). The legacy `TransactionProducer` is silenced when
# any actor profile is configured (see sim-rs/sim-core/src/sim/tx.rs).
#
# Stake granularity: at low rb-generation-probability values (e.g.,
# Cardano-realistic 0.05) the lottery's `target_vrf_stake` is
# `total_stake × stake_share × probability`, computed in `f64` and
# truncated to `u64`. With stake=1 and prob=0.05, that truncates to
# 0 and the producer never wins. Use stake=100000 so the truncation
# preserves the probability (100000 × 1.0 × 0.05 = 5000, win iff
# random_range(0..100000) < 5000, i.e. exactly 5% per slot).

nodes:
  node-0:
    stake: 100000
    tx-generation-weight: 1
    cpu-core-count: 4
    location:
      cluster: phase-2
    producers: {}
