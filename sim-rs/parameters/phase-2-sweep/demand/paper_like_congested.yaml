# Phase-2 paper-like congested demand.
#
# Same urgency mix as `paper_like_moderate.yaml`, but with the
# pricing-sim-base phased load envelope so branch-to-branch runtime
# comparisons are not accidentally shortened by lower demand:
#
#   slots    0-400   ramp-up:            ~300 tx/slot
#   slots  400-1200  sustained overload: ~600 tx/slot
#   slots 1200-2000  recovery:           ~200 tx/slot
#
# With the current ~1KB weighted mean tx size, the overload phase is
# roughly 600 KB/slot. That exceeds the RB body cap and drives EB
# traffic, priority-vs-standard lane separation, quote drift, and the
# multiplier-floor invariant.

actors:
  components:
    # Component 0: high urgency.
    - arrival-rate-per-slot:
        phases:
          - { start-slot: 0, end-slot: 400, rate: 24.0 }
          - { start-slot: 400, end-slot: 1200, rate: 48.0 }
          - { start-slot: 1200, end-slot: 2000, rate: 16.0 }
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 17.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 5.0
    # Component 1: medium urgency.
    - arrival-rate-per-slot:
        phases:
          - { start-slot: 0, end-slot: 400, rate: 96.0 }
          - { start-slot: 400, end-slot: 1200, rate: 192.0 }
          - { start-slot: 1200, end-slot: 2000, rate: 64.0 }
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 15.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 2.0
    # Component 2: low urgency.
    - arrival-rate-per-slot:
        phases:
          - { start-slot: 0, end-slot: 400, rate: 180.0 }
          - { start-slot: 400, end-slot: 1200, rate: 360.0 }
          - { start-slot: 1200, end-slot: 2000, rate: 120.0 }
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 13.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 1.05
