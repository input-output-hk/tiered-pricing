# Phase-2 paper-like congested demand.
#
# Same urgency mix as `paper_like_moderate.yaml` but at ~6× the
# arrival rate, sustained. Per-slot total ≈ 150 txs of ~1KB each →
# ~150KB/slot, exceeding the 90KB RB body cap so demand spills into
# the EB body and exercises priority-vs-standard lane separation,
# quote drift, and the multiplier-floor invariant.

actors:
  components:
    - arrival-rate-per-slot: 12.0
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 17.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 5.0
    - arrival-rate-per-slot: 48.0
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 15.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 2.0
    - arrival-rate-per-slot: 90.0
      size-bytes:
        distribution: log-normal
        mu: 6.833
        sigma: 0.5
      value-lovelace:
        distribution: log-normal
        mu: 13.0
        sigma: 0.4
      urgency:
        distribution: constant
        value: 1.05
